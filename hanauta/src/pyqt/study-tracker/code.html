<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="study_tracker.css" rel="stylesheet"/>
</head>
<body class="bg-background text-on-surface min-h-screen overflow-hidden">
<!-- SideNavBar (Rail) -->
<aside class="fixed left-0 top-0 h-full z-50 h-screen w-20 flex flex-col items-center py-8 bg-[#1a1b26] shadow-[40px_0_60px_-15px_rgba(212,187,255,0.05)]">
<div class="mb-12">
<span class="text-xl font-bold text-[#d4bbff] tracking-tighter font-headline">H</span>
</div>
<nav class="flex flex-col gap-6 flex-1">
<!-- Active Tab: Dashboard -->
<button class="bg-[#d4bbff]/20 text-[#d4bbff] rounded-2xl p-3 transition-all duration-300 scale-95 active:scale-90 group relative" id="navDashboardButton">
<span class="material-symbols-outlined" data-icon="dashboard">dashboard</span>
<span class="absolute left-full ml-4 px-2 py-1 bg-surface-container-highest text-xs rounded opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">Dashboard</span>
</button>
<button class="text-[#4a4550] p-3 hover:text-[#d4bbff]/70 transition-colors scale-95 active:scale-90 group relative">
<span class="material-symbols-outlined" data-icon="menu_book">menu_book</span>
</button>
<button class="text-[#4a4550] p-3 hover:text-[#d4bbff]/70 transition-colors scale-95 active:scale-90 group relative">
<span class="material-symbols-outlined" data-icon="insights">insights</span>
</button>
<button class="text-[#4a4550] p-3 hover:text-[#d4bbff]/70 transition-colors scale-95 active:scale-90 group relative">
<span class="material-symbols-outlined" data-icon="layers">layers</span>
</button>
</nav>
<button class="text-[#4a4550] p-3 hover:text-[#d4bbff]/70 transition-colors scale-95 active:scale-90" id="navSettingsButton">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
</aside>
<!-- TopNavBar -->
<header class="fixed top-0 right-0 left-20 z-40 px-8 flex justify-between items-center h-16 bg-[#12131d]/80 backdrop-blur-xl">
<div class="flex items-center gap-8">
<h1 class="text-lg font-black text-[#bb9af7] font-headline tracking-tight">Hanauta Study Track</h1>
<nav class="hidden md:flex gap-6 items-center">
<a class="text-[#4a4550] hover:text-[#d4bbff] font-headline font-semibold text-sm transition-colors" href="#">Focus Mode</a>
<a class="text-[#4a4550] hover:text-[#d4bbff] font-headline font-semibold text-sm transition-colors" href="#">Resources</a>
</nav>
</div>
<div class="flex items-center gap-4">
<!-- Subdued Stats (Bento Chips) -->
<div class="flex gap-2">
<div class="flex items-center gap-2 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-sm text-primary" data-icon="bolt">bolt</span>
<span class="text-xs font-bold font-label" id="streakChipText">12 Day Streak</span>
</div>
<div class="flex items-center gap-2 bg-surface-container-low px-3 py-1.5 rounded-full">
<span class="material-symbols-outlined text-sm text-secondary" data-icon="timer">timer</span>
<span class="text-xs font-bold font-label" id="todayChipText">45m Today</span>
</div>
</div>
<div class="flex gap-3 ml-4">
<button class="text-[#4a4550] hover:bg-[#1a1b26] p-2 rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
<button class="text-[#4a4550] hover:bg-[#1a1b26] p-2 rounded-full transition-colors active:opacity-80">
<span class="material-symbols-outlined" data-icon="account_circle">account_circle</span>
</button>
</div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="pl-20 pt-16 h-screen flex flex-col items-center justify-start overflow-y-auto no-scrollbar relative pb-32">
<!-- Subtle Ambient Glows -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-primary/5 blur-[120px] rounded-full pointer-events-none"></div>
<div class="absolute bottom-0 right-0 w-[400px] h-[400px] bg-secondary/5 blur-[100px] rounded-full pointer-events-none"></div>
<!-- Central Focused Goal Card -->
<section class="w-full max-w-4xl px-8 z-10 flex flex-col items-center pt-12">
<div class="w-full glass-panel p-12 rounded-lg border border-outline-variant/5 text-center transition-transform hover:scale-[1.01]">
<span class="text-primary text-xs font-bold tracking-widest uppercase mb-4 block font-label opacity-70">Current Objective</span>
<h2 class="text-5xl font-extrabold font-headline text-on-surface tracking-tight leading-tight mb-8" id="objectiveHeadline">
                Finish 3 Pomodoros of <br/>
<span class="text-primary" id="objectiveSubject">Japanese Listening</span>
</h2>
<!-- Progress Indicator -->
<div class="max-w-md mx-auto">
<div class="flex justify-between items-end mb-3">
<span class="text-sm font-label text-on-surface-variant">Progress</span>
<span class="text-lg font-bold font-headline text-primary" id="objectiveProgressText">1 / 3</span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full shadow-[0_0_15px_rgba(212,187,255,0.4)]" id="objectiveProgressBar"></div>
</div>
</div>
</div>
<!-- Study Insights Carousel (New Addition) -->
<div class="mt-8 w-full">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl" data-icon="lightbulb">lightbulb</span>
<h3 class="font-headline text-sm font-bold tracking-tight text-on-surface-variant uppercase">Study Insights</h3>
</div>
<div class="flex gap-2">
<button class="p-1.5 rounded-full hover:bg-surface-container-high text-on-surface-variant/60 hover:text-primary transition-all" id="insightPrevButton">
<span class="material-symbols-outlined text-base" data-icon="chevron_left">chevron_left</span>
</button>
<button class="p-1.5 rounded-full hover:bg-surface-container-high text-on-surface-variant/60 hover:text-primary transition-all" id="insightNextButton">
<span class="material-symbols-outlined text-base" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<div class="flex gap-4 overflow-x-auto no-scrollbar pb-2 snap-x" id="insightsTrack">
</div>
<!-- Pagination Dots -->
<div class="flex justify-center gap-1.5 mt-4" id="insightDots">
</div>
</div>
<!-- Today's Agenda (Minimalist List) -->
<div class="mt-12 w-full max-w-2xl">
<div class="flex items-center justify-between mb-8">
<h3 class="font-headline text-xl font-bold tracking-tight">Today's Agenda</h3>
<div class="flex items-center gap-3">
<button class="text-xs font-label px-3 py-2 rounded-full bg-surface-container-low text-primary hover:bg-surface-container-high transition-colors" id="addTaskButton">Add Task</button>
<span class="text-on-surface-variant text-sm font-label" id="agendaDate">Tuesday, Oct 24</span>
</div>
</div>
<div class="space-y-4" id="agendaList">
</div>
</div>
</section>
<!-- Floating Action Button -->
<div class="fixed bottom-12 right-12 flex flex-col items-end gap-4 z-50">
<div class="bg-surface-container-high/80 backdrop-blur px-4 py-2 rounded-full mb-2 opacity-0 hover:opacity-100 transition-opacity">
<span class="text-xs font-bold font-label" id="studyFabHint">Ready to focus?</span>
</div>
<button class="flex items-center gap-4 bg-primary text-on-primary px-8 py-5 rounded-full shadow-[0_20px_40px_-10px_rgba(212,187,255,0.3)] hover:scale-105 active:scale-95 transition-all group" id="studyFabButton">
<span class="font-headline font-bold text-lg" id="studyFabLabel">Start Study Session</span>
<div class="w-8 h-8 rounded-full bg-on-primary/20 flex items-center justify-center group-hover:rotate-12 transition-transform">
<span class="material-symbols-outlined text-xl" data-icon="play_arrow" id="studyFabIcon" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</button>
</div>
</main>
<!-- Visual Texture Overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.03] contrast-150 mix-blend-overlay">
<div class="local-noise w-full h-full"></div>
</div>
</body></html>
