<section class="w-full max-w-4xl px-8 z-10 flex flex-col items-center pt-12">
<div class="w-full glass-panel p-12 rounded-lg border border-outline-variant/5 text-center transition-transform hover:scale-[1.01]">
<span class="text-primary text-xs font-bold tracking-widest uppercase mb-4 block font-label opacity-70">Current Objective</span>
<h2 class="text-5xl font-extrabold font-headline text-on-surface tracking-tight leading-tight mb-8" id="objectiveHeadline">
            Finish 3 Pomodoros of <br/>
<span class="text-primary" id="objectiveSubject">Japanese Listening</span>
</h2>
<div class="max-w-md mx-auto">
<div class="flex justify-between items-end mb-3">
<span class="text-sm font-label text-on-surface-variant">Progress</span>
<span class="text-lg font-bold font-headline text-primary" id="objectiveProgressText">1 / 3</span>
</div>
<div class="h-3 w-full bg-surface-container-highest rounded-full overflow-hidden">
<div class="h-full bg-primary w-1/3 rounded-full shadow-[0_0_15px_rgba(212,187,255,0.4)]" id="objectiveProgressBar"></div>
</div>
</div>
</div>
<div class="mt-8 w-full">
<div class="flex items-center justify-between mb-4">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-xl">lightbulb</span>
<h3 class="font-headline text-sm font-bold tracking-tight text-on-surface-variant uppercase">Study Insights</h3>
</div>
<div class="flex gap-2">
<button class="p-1.5 rounded-full hover:bg-surface-container-high text-on-surface-variant/60 hover:text-primary transition-all" id="insightPrevButton">
<span class="material-symbols-outlined text-base">chevron_left</span>
</button>
<button class="p-1.5 rounded-full hover:bg-surface-container-high text-on-surface-variant/60 hover:text-primary transition-all" id="insightNextButton">
<span class="material-symbols-outlined text-base">chevron_right</span>
</button>
</div>
</div>
<div class="flex gap-4 overflow-x-auto no-scrollbar pb-2 snap-x" id="insightsTrack"></div>
<div class="flex justify-center gap-1.5 mt-4" id="insightDots"></div>
</div>
<div class="mt-12 w-full max-w-2xl">
<div class="flex items-center justify-between mb-8">
<h3 class="font-headline text-xl font-bold tracking-tight">Today's Agenda</h3>
<div class="flex items-center gap-3">
<button class="text-xs font-label px-3 py-2 rounded-full bg-surface-container-low text-primary hover:bg-surface-container-high transition-colors" id="addTaskButton">Add Task</button>
<span class="text-on-surface-variant text-sm font-label" id="agendaDate">Tuesday, Oct 24</span>
</div>
</div>
<div class="space-y-4" id="agendaList"></div>
</div>
</section>
<div class="fixed bottom-12 right-12 flex flex-col items-end gap-4 z-50">
<div class="bg-surface-container-high/80 backdrop-blur px-4 py-2 rounded-full mb-2 opacity-0 hover:opacity-100 transition-opacity">
<span class="text-xs font-bold font-label" id="studyFabHint">Ready to focus?</span>
</div>
<button class="flex items-center gap-4 bg-primary text-on-primary px-8 py-5 rounded-full shadow-[0_20px_40px_-10px_rgba(212,187,255,0.3)] hover:scale-105 active:scale-95 transition-all group" id="studyFabButton">
<span class="font-headline font-bold text-lg" id="studyFabLabel">Start Study Session</span>
<div class="w-8 h-8 rounded-full bg-on-primary/20 flex items-center justify-center group-hover:rotate-12 transition-transform">
<span class="material-symbols-outlined text-xl" id="studyFabIcon" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</div>
</button>
</div>
