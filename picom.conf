backend = "glx";
vsync = true;
use-damage = false;

detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;

log-level = "warn";

shadow = true;
shadow-radius = 42;
shadow-opacity = 0.42;
shadow-offset-x = 0;  # Changed from 0
shadow-offset-y = 0;  # Changed from 0
shadow-color = "#85d6c0";

fading = true;

inactive-opacity = 1;
active-opacity = 1;
inactive-opacity-override = false;

corner-radius = 18;
transparent-clipping = false;

corner-radius-rules = [
  "88:name = 'PyQt Notification Center'"
];

shadow-exclude = [
  # important: exclude genuinely shaped windows,
  # but keep rounded-corner ones eligible for shadow
  "bounding_shaped && !rounded_corners",

  "class_g = 'Eww'",
  "window_type = 'dock'",
  "window_type = 'notification'",
  "window_type = 'utility'",
  "class_g = 'Rofi'",
  "class_g = 'Conky'",
  # Hanauta's smaller frameless PyQt popups already paint their own Qt
  # shadows. Letting picom shadow their transparent outer rect causes the
  # detached shadow effect that is most visible on smaller widgets.
  "name = 'Hanauta Launcher'",
  "name = 'Hanauta Window Switcher'",
  "name = 'Hanauta Hotkeys'",
  "name = 'Hanauta Weather'",
  "name = 'Hanauta Calendar'",
  "name = 'Hanauta Game Mode'",
  "name = 'Hanauta CAP Alerts'",
  "name = 'Hanauta CAP Alert'",
  "name = 'Hanauta Reminders'",
  "name = 'Hanauta Reminder'",
  "name = 'Hanauta Pomodoro'",
  "name = 'Hanauta OBS'",
  "name = 'Hanauta Crypto'",
  "name = 'Hanauta VPS'",
  "name = 'Hanauta Updates'",
  "name = 'Hanauta AI'",
  "name = 'WireGuard'",
  "name = 'Wi-Fi Control'",
  "name = 'ntfy Publisher'",
  "name = 'Christian Devotion'",
  "class_g = 'HanautaNotification'",
  "name *= 'Hanauta Notification'",
  "name = 'Hanauta Desktop Clock'"
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'notification'",
  "window_type = 'utility'",
  "class_g = 'Rofi'",
  "class_g = 'Conky'",
  "class_g = 'mpv'",
  "name = 'PyQt Notification Center'",
  "class_g = 'HanautaNotification'",
  "name *= 'Hanauta Notification'",
  "name = 'Hanauta Desktop Clock'"
];

opacity-rule = [
  "100:class_g = 'Eww'",
  "100:class_g = 'Alacritty'",
  "100:class_g = 'kitty'",
  "100:name = 'PyQt Notification Center'"
];

wintypes:
{
  normal = { shadow = true; full-shadow = true; };
  dialog = { shadow = true; full-shadow = true; };

  tooltip = { fade = false; shadow = false; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  notification = { shadow = false; full-shadow = false; focus = false; };
  utility = { shadow = false; full-shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { shadow = false; };
  dropdown_menu = { shadow = false; };
};
