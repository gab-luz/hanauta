backend = "glx";
vsync = true;
use-damage = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
mark-wmwin-focused = true;
mark-ovredir-focused = true;
log-level = "warn";
shadow = true;
shadow-radius = 42;
shadow-opacity = 0.42;
shadow-offset-x = 0;
shadow-offset-y = 0;
shadow-color = "#b0c6ff";
fading = true;
inactive-opacity = 1;
active-opacity = 1;
inactive-opacity-override = false;
corner-radius = 18;
transparent-clipping = false;
corner-radius-rules = [
  "88:name = 'PyQt Notification Center'"
];
shadow-exclude = [
  "class_g = 'Eww'",
  "window_type = 'dock'",
  "class_g = 'Rofi'",
  "class_g = 'Conky'",
  "class_g = 'HanautaNotification'",
  "name *= 'Hanauta Notification'",
  "name = 'Hanauta Desktop Clock'",
];

rounded-corners-exclude = [
  "window_type = 'dock'",
  "class_g = 'Rofi'",
  "class_g = 'Conky'",
  "class_g = 'mpv'",
  "name = 'PyQt Notification Center'",
  "name = 'Hanauta Desktop Clock'"
  
];

opacity-rule = [
  "100:class_g = 'Eww'",
  "100:class_g = 'Alacritty'",
  "100:class_g = 'kitty'",
  "100:name = 'PyQt Notification Center'"
];

wintypes:
{
  tooltip = { fade = false; shadow = false; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { shadow = false; };
  dropdown_menu = { shadow = false; };
};
